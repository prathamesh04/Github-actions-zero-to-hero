name: Python Self Hosted CI

on:
  push:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Python
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install Dependencies
        run: |
          python3 -m pip install pytest --break-system-packages

      - name: Run Tests
        run: |
          cd src
          python3 -m pytest addition.py -v
